<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to your UniConnect account</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Register</a>
      </div>
    </div>
  </div>

  <script src="/js/icons.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function initLogin() {
      const data = await API.me().catch(() => null);
      const user = data ? data.user : null;
      if (user) return window.location.href = '/dashboard.html';
      Sidebar.render(null, 'login');
    }
    initLogin();

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await API.login(email, password);
        showToast('Login successful!');
        setTimeout(() => window.location.href = '/dashboard.html', 800);
      } catch (err) {
        showToast(err.error || 'Login failed.', 'error');
      }
    }
  </script>
</body>
</html>
