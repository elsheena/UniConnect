<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events Hub — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="page-content" style="position:relative; overflow:hidden;">
    <div class="hero-orb hero-orb-1" style="opacity: 0.1; width: 500px; height: 500px; top: -100px; right: -100px;"></div>
    <div class="hero-orb hero-orb-2" style="opacity: 0.05; width: 400px; height: 400px; bottom: 50px; left: -100px;"></div>

    <div class="container" style="position:relative; z-index:1;">
      <div class="page-header">
        <h1><span data-icon="calendar"></span> Events Hub</h1>
        <p>Stay connected with major forums, festivals, and opportunities for international students in Russia.</p>
      </div>

      <div id="events-grid" class="grid-2">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="/js/icons.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function loadEvents() {
      const user = await checkAuth();
      Sidebar.render(user, 'events');

      try {
        const response = await fetch('/api/events');
        const data = await response.json();
        const container = document.getElementById('events-grid');

        if (!data.events || data.events.length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No events found</h3></div>';
          return;
        }

        container.innerHTML = data.events.map(ev => `
          <div class="card event-card" style="padding: 0; display: flex; flex-direction: column;">
            <div style="height: 180px; background: url('${ev.image}') center/cover no-repeat; border-radius: 20px 20px 0 0;"></div>
            <div style="padding: 24px;">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                <span class="badge badge-blue">${ev.category}</span>
                <span style="font-size: 0.85rem; color: var(--text-muted);"><span data-icon="calendar"></span> ${ev.date}</span>
              </div>
              <h3 style="margin-bottom: 8px;">${ev.title}</h3>
              <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px;">${ev.description}</p>
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: 0.85rem; font-weight: 600;"><span data-icon="globe"></span> ${ev.location}</span>
                <a href="${ev.link}" target="_blank" class="btn btn-primary btn-sm">Official Website</a>
              </div>
            </div>
          </div>
        `).join('');

        // Re-render icons
        container.querySelectorAll('[data-icon]').forEach(el => {
          const name = el.getAttribute('data-icon');
          el.innerHTML = getIcon(name, 14);
        });

      } catch (e) {
        console.error(e);
      }
    }
    loadEvents();
  </script>
</body>
</html>
