<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universities — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="page-content">
    <div class="container">
      <div class="page-header">
        <h1><span data-icon="building"></span> Partner Universities</h1>
        <p>Explore our network of premium Russian universities targeted by our students.</p>
      </div>

      <div id="universities-grid" class="grid-3">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="/js/icons.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function loadUniversities() {
      const user = await checkAuth();
      Sidebar.render(user, 'universities');

      const container = document.getElementById('universities-grid');
      try {
        const data = await API.getUniversities();
        if (!data.universities || data.universities.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No universities found.</p></div>';
        } else {
          container.innerHTML = data.universities.map(u => `
            <div class="service-card" style="cursor:pointer;" onclick="window.location.href='/university.html?id=${u.id}'">
              <div class="service-emoji"><div style="background:white;padding:5px;border-radius:8px;border:1px solid var(--border-subtle);"><img src="${u.logo}" style="width:40px;height:40px;object-fit:contain;"></div></div>
              <h3 style="margin-top:10px;">${u.name}</h3>
              <p style="color:var(--text-secondary);font-size:0.82rem;margin-bottom:8px;"><span data-icon="map-pin"></span> ${u.city}</p>
              <p style="font-size:0.85rem;color:var(--text-main);line-height:1.4;">${u.description.substring(0, 80)}...</p>
              <div style="flex:1;"></div>
              <button class="btn btn-secondary btn-full" style="margin-top:20px;">Explore Campus</button>
            </div>
          `).join('');
          
          // Render SVG icons in the newly injected HTML
          document.querySelectorAll('#universities-grid [data-icon]').forEach(el => {
            const iconName = el.getAttribute('data-icon');
            const size = el.getAttribute('data-size') || 20;
            el.innerHTML = getIcon(iconName, size);
          });
        }
      } catch (e) {
        container.innerHTML = '<div class="empty-state"><p>Failed to load universities.</p></div>';
      }
    }

    loadUniversities();
  </script>
</body>
</html>
