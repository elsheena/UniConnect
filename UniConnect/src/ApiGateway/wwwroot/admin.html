<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css?v=2">
  <link rel="stylesheet" href="/css/admin.css?v=2">
</head>

<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="page-content" style="position:relative; overflow:hidden;">
    <div class="container" style="position:relative; z-index:1;">
      <div class="page-header">
        <h1><span data-icon="shield"></span> Admin Panel</h1>
        <p>Manage users, verify documents, and monitor platform activity.</p>
      </div>

      <div class="stat-cards" id="admin-stats">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchAdminTab('docs')"><span data-icon="document"></span> Pending
          Documents</button>
        <button class="tab" onclick="switchAdminTab('groups')"><span data-icon="globe"></span> Groups</button>
        <button class="tab" onclick="switchAdminTab('users')"><span data-icon="users"></span> Users</button>
        <button class="tab" onclick="switchAdminTab('chats')"><span data-icon="chat"></span> Moderation</button>
      </div>

      <div id="admin-content">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/icons.js?v=3"></script>
  <script src="/js/api.js?v=3"></script>
  <script src="/js/sidebar.js?v=3"></script>
  <script src="/js/app.js?v=3"></script>
  <script src="/js/admin.js?v=3"></script>

  <!-- Rejection Modal -->
  <div class="modal-overlay" id="reject-modal">
    <div class="modal">
      <h2>Reject Document Verification</h2>
      <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;">Please provide a reason for rejecting
        this document.</p>
      <div class="form-group">
        <label style="font-weight:600;">Rejection Reason <span style="color:var(--accent-red);">*</span></label>
        <textarea id="reject-note" placeholder="Enter reason for rejection..."
          style="height:100px; width:100%; margin-top:6px; padding:10px; border-radius:8px; border:1px solid var(--border-subtle); background:var(--bg-input); color:var(--text-primary); font-family:inherit;"></textarea>
      </div>
      <div class="modal-actions" style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
        <button type="button" class="btn btn-secondary" onclick="closeRejectModal()">Cancel</button>
        <button type="button" class="btn btn-danger" onclick="submitRejection()">Reject Document</button>
      </div>
    </div>
  </div>
</body>

</html>
