<div class="card event-card">
  <div class="event-card-image" style="background-image: url('{{image}}');"></div>
  <div class="event-card-body">
    <div class="event-card-meta">
      <span class="badge badge-blue">{{category}}</span>
      <span class="event-card-meta-date"><span data-icon="calendar"></span> {{date}}</span>
    </div>
    <h3>{{title}}</h3>
    <p>{{description}}</p>
    <div class="event-card-footer">
      <span class="event-card-location"><span data-icon="globe"></span> {{location}}</span>
      <a href="{{link}}" target="_blank" class="btn btn-primary btn-sm">Official Website</a>
    </div>
  </div>
</div>
