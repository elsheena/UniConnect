<div class="university-card cursor-pointer" data-id="{{id}}">
  <div class="uni-card-logo-container">
    <img src="{{logo}}" alt="{{name}} Logo" class="uni-card-logo-img">
  </div>
  <div class="uni-card-body">
    <h3 class="uni-card-title">{{name}}</h3>
    <p class="uni-card-city"><span data-icon="map-pin"></span> {{city}}</p>
    <p class="uni-card-desc">{{description}}...</p>
    <a href="{{linkUrl}}" class="btn btn-secondary btn-full margin-top-md" style="margin-top: auto; display: block; text-align: center; text-decoration: none;">Explore Programs →</a>
  </div>
</div>
