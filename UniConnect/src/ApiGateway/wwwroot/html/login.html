<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css?v=4">
  <link rel="stylesheet" href="/css/auth.css?v=4">
</head>
<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to your UniConnect account</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Your password" required>
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')"><span data-icon="eye" data-size="16"></span></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Register</a>
      </div>
    </div>
  </div>

  <script src="/js/icons.js?v=4"></script>
  <script src="/js/api.js?v=4"></script>
  <script src="/js/sidebar.js?v=4"></script>
  <script src="/js/app.js?v=4"></script>
  <script src="/js/login.js?v=4"></script>
</body>
</html>
