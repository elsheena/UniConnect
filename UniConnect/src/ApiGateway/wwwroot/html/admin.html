<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css?v=4">
  <link rel="stylesheet" href="/css/admin.css?v=4">
</head>

<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="page-content admin-page-content">
    <div class="container admin-container">
      <div class="page-header">
        <h1><span data-icon="shield"></span> Admin Panel</h1>
        <p>Manage users, verify documents, and monitor platform activity.</p>
      </div>

      <div class="stat-cards" id="admin-stats">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" id="tab-docs"><span data-icon="document"></span> Pending Documents</button>
        <button class="tab" id="tab-groups"><span data-icon="globe"></span> Groups</button>
        <button class="tab" id="tab-users"><span data-icon="users"></span> Users</button>
        <button class="tab" id="tab-chats"><span data-icon="chat"></span> Moderation</button>
      </div>

      <div id="admin-content">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/icons.js?v=4"></script>
  <script src="/js/api.js?v=4"></script>
  <script src="/js/sidebar.js?v=4"></script>
  <script src="/js/app.js?v=4"></script>
  <script src="/js/admin.js?v=4"></script>

  <!-- Rejection Modal -->
  <div class="modal-overlay" id="reject-modal">
    <div class="modal">
      <h2>Reject Document Verification</h2>
      <p class="modal-subtitle">Please provide a reason for rejecting this document.</p>
      <div class="form-group">
        <label class="modal-label">Rejection Reason <span class="text-danger">*</span></label>
        <textarea id="reject-note" placeholder="Enter reason for rejection..." class="modal-reject-note"></textarea>
      </div>
      <div class="modal-actions modal-reject-actions">
        <button type="button" class="btn btn-secondary" id="btn-cancel-reject">Cancel</button>
        <button type="button" class="btn btn-danger" id="btn-submit-reject">Reject Document</button>
      </div>
    </div>
  </div>
</body>

</html>
