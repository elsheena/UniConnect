<div class="booking-item">
  <span style="font-size:1.6rem;">{{iconHtml}}</span>
  <div class="booking-info">
    <h4>{{serviceName}}</h4>
    <p>{{detailsText}} • {{timeAgoStr}}{{acceptedByText}}</p>
  </div>
  <div class="booking-actions">
    <span class="service-price-tag"><span class="amount">{{price}} MP</span></span>
    {{statusBadgeHtml}}
    {{actionButtonsHtml}}
  </div>
</div>
