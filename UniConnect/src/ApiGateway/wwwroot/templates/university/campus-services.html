<div class="uni-info-grid" style="margin-top:40px;">
  <div>
    <h2 style="margin-bottom:16px;">About the University</h2>
    <p style="font-size:1.1rem; line-height:1.6; color:var(--text-main);">{{description}}</p>
  </div>

  <div class="service-selection">
    <h3 style="margin-bottom:20px;">Book a Campus Service</h3>
    <div class="form-group">
      <label>Service Type</label>
      <select id="booking-service">
        {{serviceOptions}}
      </select>
    </div>
    <div class="form-group">
      <label>Arrival Notes / Specific Request</label>
      <textarea id="booking-notes" placeholder="Tell us more about what you need..."></textarea>
    </div>
    <button class="btn btn-primary btn-block" onclick="bookUniService({{uniId}})">Confirm Booking</button>
    <p style="font-size:0.75rem; color:var(--text-muted); margin-top:12px; text-align:center;">Verified students from this university will be notified of your request.</p>
  </div>
</div>
