<div class="uni-hero-banner" style="background-image: url('{{buildingImg}}');">
  <div class="uni-hero-overlay"></div>
  <div class="uni-hero-content">
    <div class="uni-hero-text">
      <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 14px;">
        <img src="{{logoImg}}" alt="Logo" class="uni-logo-img" style="aspect-ratio: 1/1;">
        <div>
          <h1 style="margin: 0; color: white; font-size: 2.2rem; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.6);">{{name}}</h1>
          <p style="color: rgba(255,255,255,0.9); margin: 6px 0 0 0; font-size: 1.05rem; display: flex; align-items: center; gap: 6px; text-shadow: 0 1px 2px rgba(0,0,0,0.6);">
            <span data-icon="map-pin"></span> {{city}}, Russia
          </p>
        </div>
      </div>
    </div>
    
    <div class="currency-card">
      <label style="font-size: 0.72rem; color: rgba(255, 255, 255, 0.85); display: block; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;">Display Currency</label>
      <select id="tuition-currency" onchange="updateTuitionCosts()">
        <option value="RUB" style="color: black;">Russian Ruble (RUB)</option>
        <option value="USD" style="color: black;">US Dollar (USD)</option>
        <option value="EUR" style="color: black;">Euro (EUR)</option>
        {{localCurrencyOption}}
      </select>
    </div>
  </div>
</div>
