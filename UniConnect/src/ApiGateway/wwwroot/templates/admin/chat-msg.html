<div style="display:flex; flex-direction:column; align-items:{{alignItems}}; margin-bottom:12px;">
  <div style="max-width:85%; padding:10px 14px; border-radius:14px; background:{{bg}}; border:1px solid {{border}};">
     <div style="font-size:0.7rem; font-weight:800; text-transform:uppercase; margin-bottom:4px; color:{{color}};">
       {{senderLabel}} (ID: {{senderId}})
     </div>
     <div style="font-size:0.9rem;">{{text}}</div>
  </div>
  <div style="font-size:0.65rem; color:var(--text-muted); margin-top:4px;">{{timestampFormatted}}</div>
</div>
