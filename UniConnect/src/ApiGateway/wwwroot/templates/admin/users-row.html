<tr style="border-bottom:1px solid var(--border-subtle);">
  <td style="padding:12px;font-size:0.88rem;">{{id}}</td>
  <td style="padding:12px;font-size:0.88rem;font-weight:600;">
    <a href="/user-details.html?id={{id}}" style="color:var(--accent-blue); text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">{{fullName}}</a>
  </td>
  <td style="padding:12px;font-size:0.88rem;color:var(--text-secondary);">{{email}}</td>
  <td style="padding:12px;">{{roleBadgeHtml}}</td>
  <td style="padding:12px;">{{verifiedBadgeHtml}}</td>
  <td style="padding:12px;font-size:0.85rem;">{{universityName}}</td>
</tr>
