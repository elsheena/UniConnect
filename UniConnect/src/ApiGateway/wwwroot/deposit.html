<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css?v=4">
  <link rel="stylesheet" href="/css/wallet.css?v=4">
</head>
<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="page-content">
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>

    <div class="container container-small">
      <div class="page-header">
        <a href="/wallet.html" class="back-link">← Back to Wallet</a>
        <h1><span data-icon="creditcard"></span> Deposit Funds</h1>
      </div>

      <!-- Amount Summary -->
      <div class="card card-center-padding">
        <div class="deposit-label">You are depositing</div>
        <div class="deposit-amount-display" id="deposit-display">$0.00</div>
      </div>

      <!-- Card Form -->
      <div class="card card-padded">
        <h3 class="payment-details-title"><span data-icon="lock"></span> Payment Details</h3>

        <div class="form-group">
          <label for="card-name">Cardholder Name</label>
          <input type="text" id="card-name" placeholder="Name on card" required>
        </div>

        <div class="form-group">
          <label for="card-number">Card Number</label>
          <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>

        <div class="grid-2-gap-sm">
          <div class="form-group">
            <label for="card-expiry">Expiry Date</label>
            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required>
          </div>
          <div class="form-group">
            <label for="card-cvv">CVV</label>
            <input type="password" id="card-cvv" placeholder="***" maxlength="4" required>
          </div>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="save-card" class="checkbox-input">
          <label for="save-card" class="checkbox-label">Save card details for future deposits</label>
        </div>

        <button class="btn btn-primary btn-full" id="pay-btn">
          <span data-icon="lock"></span> Pay <span id="pay-btn-amount">$0.00</span>
        </button>

        <div class="flex-center-gap">
          <span data-icon="shield"></span>
          <span class="secure-label">Secured with 256-bit SSL encryption</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/icons.js?v=4"></script>
  <script src="/js/api.js?v=4"></script>
  <script src="/js/sidebar.js?v=4"></script>
  <script src="/js/app.js?v=4"></script>
  <script src="/js/deposit.js?v=4"></script>
</body>
</html>
