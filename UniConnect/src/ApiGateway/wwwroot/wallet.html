<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet — UniConnect</title>
  <link rel="stylesheet" href="/css/style.css?v=2">
  <link rel="stylesheet" href="/css/wallet.css?v=2">
</head>
<body class="sidebar-layout">
  <div id="sidebar-container"></div>

  <div class="page-content">
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>

    <div class="container wallet-container">
      <div class="page-header wallet-header-flex">
        <div>
          <h1><span data-icon="wallet"></span> My Wallet</h1>
          <p>Manage your funds and Matryoshka Points</p>
        </div>
        <div class="form-group currency-selector-group">
          <label class="label-small-muted">Display Currency</label>
          <select id="display-currency" class="padding-sm">
            <option value="USD">US Dollar (USD)</option>
            <option value="RUB">Russian Ruble (RUB)</option>
          </select>
        </div>
      </div>

      <!-- Balance Cards -->
      <div class="wallet-balance-grid">
        <div class="card wallet-balance-card">
          <div class="deposit-label">Cash Balance</div>
          <div class="balance-val-green" id="balance-usd">$0.00</div>
          <div class="balance-subtext" id="balance-usd-rate"></div>
        </div>
        <div class="card wallet-balance-card">
          <div class="deposit-label">Matryoshka Points</div>
          <div class="balance-val-purple" id="balance-mp">0 MP</div>
          <div class="balance-subtext">1 USD = 100 MP (1% fee applies)</div>
        </div>
      </div>

      <!-- Action Cards -->
      <div class="wallet-action-grid">
        <!-- Deposit -->
        <div class="card wallet-action-card">
          <h4 class="heading-margin-bottom"><span data-icon="creditcard"></span> Deposit</h4>
          <div class="form-group form-group-margin-xs">
            <input type="number" id="deposit-amount" placeholder="Amount in $" min="1" step="0.01">
          </div>
          <div class="secure-label-margin">&nbsp;</div>
          <button class="btn btn-primary btn-sm btn-full" id="btn-deposit">Deposit</button>
        </div>

        <!-- Buy MP -->
        <div class="card wallet-action-card">
          <h4 class="heading-margin-bottom"><span data-icon="matryoshka"></span> Buy MP</h4>
          <div class="form-group form-group-margin-xs">
            <input type="number" id="buy-mp-amount" placeholder="USD to convert" min="0.01" step="0.01">
          </div>
          <div class="secure-label-margin" id="buy-mp-preview">1% commission applies</div>
          <button class="btn btn-primary btn-sm btn-full" id="btn-buy-mp">Convert to MP</button>
        </div>

        <!-- Redeem MP (students only) -->
        <div class="card wallet-action-card" id="redeem-card">
          <h4 class="heading-margin-bottom"><span data-icon="money"></span> Redeem MP</h4>
          <div class="form-group form-group-margin-xs">
            <input type="number" id="redeem-amount" placeholder="MP to redeem" min="1000" step="100">
          </div>
          <div class="secure-label-margin" id="redeem-preview">Min: 1,000 MP</div>
          <button class="btn btn-primary btn-sm btn-full" id="btn-redeem">Redeem to USD</button>
        </div>

        <!-- Withdraw -->
        <div class="card wallet-action-card">
          <h4 class="heading-margin-bottom"><span data-icon="inbox"></span> Withdraw</h4>
          <div class="form-group form-group-margin-xs">
            <input type="number" id="withdraw-amount" placeholder="Amount in $" min="50" step="0.01">
          </div>
          <div class="secure-label-margin">Min: $50.00</div>
          <button class="btn btn-danger btn-sm btn-full" id="btn-withdraw">Withdraw</button>
        </div>
      </div>

      <!-- Transaction History -->
      <div class="card wallet-action-card">
        <h3 class="heading-margin-md"><span data-icon="list"></span> Transaction History</h3>
        <div id="tx-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/icons.js?v=2"></script>
  <script src="/js/api.js?v=2"></script>
  <script src="/js/sidebar.js?v=2"></script>
  <script src="/js/app.js?v=2"></script>
  <script src="/js/wallet.js?v=2"></script>
</body>
</html>
